# Configuration for cam-reverse
# High-quality video streaming configuration

http_server:
  port: 5000

logging:
  level: info
  use_color: true

cameras:
  # Your main A9 PTZ camera - highest quality
  PTZC658937AAQSZ:
    alias: "My PTZ Camera"
    rotate: 0
    mirror: false
    audio: true    # Enable audio
    fix_packet_loss: true
  
  # Second camera
  BATF150915DTMNZ:
    alias: "Second Camera"
    rotate: 0
    mirror: false
    audio: true    # Enable audio
    fix_packet_loss: true

# Use broadcast discovery to find all cameras
discovery_ips:
  - 192.168.1.255   # Broadcast - finds all cameras on the network

blacklisted_ips: []
